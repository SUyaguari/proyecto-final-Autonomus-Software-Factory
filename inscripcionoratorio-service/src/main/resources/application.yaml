spring:
  application:
    name: inscripcionoratorio-service
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  datasource:
    url: jdbc:h2:mem:inscripcionoratorio;DB_CLOSE_DELAY=-1
  security:
    user:
      name: ${APP_USER}
      password: ${APP_PASSWORD}
      roles: RECEPTOR_INSCRIPCIONES

server:
  servlet:
    context-path: /api/v1
